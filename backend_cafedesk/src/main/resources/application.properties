spring.application.name=backend_cafedesk

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cafedesk_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Image Upload and validation
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Invoice PDF Integration
customjs.api.url=https://e.customjs.io/html2pdf
customjs.api.key=${CUSTOMJS_API_KEY}

# Cashfree API Keys
cashfree.api.id=${CASHFREE_API_ID}
cashfree.secretKey=${CASHFREE_SECRET_KEY}